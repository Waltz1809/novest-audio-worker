services:
  # VieNeu TTS chạy ngoài Docker trực tiếp trên host để dùng GPU
  # Chạy: uv run serve  (trong repo vieneu-tts)
  # Sau đó mới chạy: docker compose up worker

  worker:
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TTS_API_URL=http://host.docker.internal:23333/v1
      - NOVEST_API_URL=https://novest.me
      - WORKER_TOTP_SECRET=${WORKER_TOTP_SECRET}
      - WORKER_MACHINE=desktop-5060
    volumes:
      - ./tmp:/tmp/audio
    command: python worker/main.py --mode watch --interval 300
